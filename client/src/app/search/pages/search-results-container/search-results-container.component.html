<div *ngIf="loading">Söker...</div>
<div *ngIf="error">{{ error }}</div>

<app-product-display
  *ngIf="!loading && !error && products.length"
  [products]="products">
</app-product-display>

<div *ngIf="!loading && !error && !products.length">
  Inga produkter hittades för "{{ searchTerm }}".
</div>

<div class="adminShell">
  <app-admin-header class="header">Administration</app-admin-header>
  <app-admin-left-bar class="sidebar">Products</app-admin-left-bar>

  <section class="adminContent">
    <h1>Alla produkter</h1>

    <p *ngIf="error" style="color: red">{{ error }}</p>

    <app-product-table
      [products]="products"
      [isLoading]="isLoading"
      (refresh)="onRefresh()"
      (deleteProduct)="onDeleteProduct($event)"
    >
    </app-product-table>
  </section>
</div>

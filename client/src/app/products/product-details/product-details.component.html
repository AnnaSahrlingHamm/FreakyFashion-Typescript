<section *ngIf="!loading && product; else loadingOrError" class="product-details">
  <div class="product-image">
    <img
      [src]="'assets/images/' + product.image"
      [alt]="product.item || 'Produktbild saknas'"
      (error)="handleImageError($event)"
    />
  </div>

  <div class="product-info">
    <h2>{{ product.item || 'Namn saknas' }}</h2>
    <p class="brand">{{ product.brand }}</p>
    <p class="price">{{ product.price }} SEK</p>
    <p class="description">{{ product.description }}</p>
    <div class="actions">
      <button type="button" class="add-to-cart" (click)="addToCart()">
        Lägg i varukorg
      </button>
    </div>
  </div>
</section>

<app-similar-products *ngIf="product" [product]="product"></app-similar-products>

<ng-template #loadingOrError>
  <div *ngIf="loading">Laddar...</div>
  <div *ngIf="error">{{ error }}</div>
</ng-template>

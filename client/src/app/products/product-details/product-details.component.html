<div *ngIf="loading">Laddar produkt...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="product">
  <img [src]="product.image" [alt]="product.item" />
  <h2>{{ product.item }}</h2>
  <h4>{{ product.brand }}</h4>
  <p>{{ product.description }}</p>
  <p>Pris: {{ product.price }}</p>
</div>

<div *ngIf="loading">Laddar produkt...</div>

<div *ngIf="error" class="error">
  {{ error }}
</div>

<div *ngIf="!loading && product" class="product-details">
  <img
    [src]="product.image || '/placeholder.webp'"
    [alt]="product.item"
    class="product-image"
    (error)="($event.target as HTMLImageElement).src = '/placeholder.webp'"
  />

  <h1>{{ product.item }}</h1>
  <p class="price">{{ product.price }} SEK</p>

  <div *ngIf="product.brand" class="brand">Märke: {{ product.brand }}</div>

  <div *ngIf="product.description" class="description">
    {{ product.description }}
  </div>
</div>

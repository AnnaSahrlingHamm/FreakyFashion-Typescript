<header class="header">
  <div class="logocontainer">
    <a [routerLink]="'/'" class="icon" aria-label="Gå till startsidan">
      <img
        src="assets/images/nonProductImgs/FREAKYFASHIONlogo.png"
        alt="Välkommen till Freaky Fashion!"
      />
    </a>
  </div>

  <div class="formcontainer">
    <form (ngSubmit)="onSearch()" #searchForm="ngForm">
      <input
        type="search"
        id="freakysearch"
        name="q"
        [(ngModel)]="searchTerm"
        placeholder="Sök vår sajt!"
        required
      />
      <button type="submit" id="sökknapp">Sök</button>
    </form>

    <div id="headericons">
      <a href="#" (click)="$event.preventDefault()" class="icon">
        <fa-icon [icon]="['fas', 'heart']"></fa-icon>
      </a>
      <a [routerLink]="'/basket'" class="icon" aria-label="Gå till kassan">
        <fa-icon [icon]="['fas', 'shopping-basket']"></fa-icon>
      </a>
    </div>
  </div>
</header>

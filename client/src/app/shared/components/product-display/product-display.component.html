<section class="image-container">
  <ng-container *ngIf="products && products.length > 0; else noProducts">
    <ul *ngFor="let product of products" class="product-list">
      <li>
        <app-product-card [product]="product"></app-product-card>
        <div *ngIf="isNewProduct(product)" class="badge">Nyhet!</div>
      </li>
    </ul>
  </ng-container>

  <ng-template #noProducts>
    <div class="empty">Inga produkter att visa</div>
  </ng-template>
</section>

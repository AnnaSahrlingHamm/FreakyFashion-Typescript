<section class="image-container">
  <!-- Tomt meddelande -->
  <div *ngIf="!products || products.length === 0" class="empty">
    Inga produkter att visa
  </div>

  <!-- Produktlista -->
  <ul *ngFor="let product of products" class="product-list">
    <li>
      <figure class="product-card">
        <a [routerLink]="['/products', product.slug || 'saknas']">
          <img
            [src]="product.image || '/placeholder.webp'"
            [alt]="product.item || 'Namn saknas'"
            class="product-image"
            (error)="($event.target as HTMLImageElement).src='/placeholder.webp'"
          />
        </a>

        <!-- Nyhetsbadge -->
        <div *ngIf="isNewProduct(product)" class="badge">Nyhet!</div>

        <figcaption class="product-title">
          {{ product.item || 'Namn saknas' }} - {{ product.price || 'Pris saknas' }} SEK
          <span *ngIf="product.brand" class="brand"> | {{ product.brand }}</span>
        </figcaption>
      </figure>
    </li>
  </ul>
</section>

<section class="hero">
  <picture>
    <source [srcset]="current.imgLarge" media="(min-width: 768px)" />
    <img
      class="hero-img"
      [src]="current.imgSmall"
      [alt]="current.alt"
      loading="lazy"
      decoding="async"
      draggable="false"
    />
  </picture>

  <div class="hero-content">
    <h1 class="hero-title">{{ current.heading }}</h1>
    <p class="hero-text">{{ current.body }}</p>
  </div>
</section>
